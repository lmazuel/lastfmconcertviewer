name: Nightly Scrape & Deploy

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 6am UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Restore image cache
        uses: actions/cache@v4
        with:
          path: images
          key: poster-images-${{ github.run_id }}
          restore-keys: poster-images-

      - name: Scrape and render
        env:
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}
          LASTFM_PASSWORD: ${{ secrets.LASTFM_PASSWORD }}
        run: uv run python cli.py run "https://www.last.fm/user/${{ secrets.LASTFM_USERNAME }}/events"

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r images _site/images 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
